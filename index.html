<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Ignited Studio — We Build What Others Only Imagine</title>
<meta name="description" content="Nova Ignited Studio — High-performance websites, AI tools, brand identity, SEO and business compliance for brands that refuse to be average. Durban, SA.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & DESIGN TOKENS
═══════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;text-decoration:none;border:none;outline:none;}
:root{
  --bg:#08070d;--bg2:#0f0e18;--card:#13121e;
  --fire:#ff6010;--ignition:#ffaa30;--gold:#ffd060;--firstlight:#fff5cc;
  --white:#faf5ee;--muted:rgba(250,245,238,.45);--dim:rgba(250,245,238,.18);
  --serif:"Cormorant Garamond",Georgia,serif;
  --sans:"Montserrat",sans-serif;
}
html{font-size:62.5%;scroll-behavior:smooth;}

/* FIX-1: overflow-x only */
body{background:var(--bg);color:var(--white);font-family:var(--sans);overflow-x:hidden;overflow-y:auto;}

/* FIX-20: noise z-index below everything interactive */
body::after{
  content:"";position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:1;opacity:0.2;
}
body::before{
  content:"";position:fixed;bottom:-20%;left:50%;transform:translateX(-50%);
  width:80vw;height:60vh;
  background:radial-gradient(ellipse at 50% 100%,rgba(255,96,16,.05) 0%,rgba(255,160,40,.025) 40%,transparent 70%);
  pointer-events:none;z-index:0;animation:ambientBreathe 8s ease-in-out infinite;
}
@keyframes ambientBreathe{0%,100%{opacity:.5;}50%{opacity:1;}}

/* ── SKIP LINK (FIX-14) ── */
.skip-link{
  position:absolute;top:-100px;left:1rem;
  padding:.8rem 1.5rem;background:var(--ignition);color:var(--bg);
  font-family:var(--sans);font-size:1.4rem;font-weight:600;border-radius:.6rem;
  transition:.2s;z-index:9999;
}
.skip-link:focus{top:1rem;}

/* ═══════════════════════════════════════
   BARS TRANSITION
═══════════════════════════════════════ */
.bars-box{position:fixed;width:100%;height:100%;display:flex;z-index:500;pointer-events:none;}
/* Bars start OFF screen (translateY(-100%)) — no load animation */
.bar{width:100%;height:100%;background:var(--bg2);transform:translateY(-100%);}
/* When .entering: bars sweep DOWN (cover screen) */
.bars-box.entering .bar{animation:sweepDown .55s ease-in-out both;animation-delay:calc(.09s * var(--i));}
/* When .leaving: bars sweep UP (uncover screen) */
.bars-box.leaving .bar{animation:sweepUp .55s ease-in-out both;animation-delay:calc(.09s * var(--i));}
@keyframes sweepDown{0%{transform:translateY(-100%);}100%{transform:translateY(0);}}
@keyframes sweepUp{0%{transform:translateY(0);}100%{transform:translateY(-100%);}}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
header{
  position:fixed;top:0;left:0;width:100%;padding:1.8rem 8%;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(8,7,13,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,160,40,.07);
  z-index:300;opacity:0;
  animation:fadeDown .7s ease .1s forwards;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

.nav-logo{display:flex;align-items:center;gap:1.2rem;cursor:pointer;}
.nav-brand{display:flex;flex-direction:column;gap:0;}
.nav-nova{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:2.4rem;line-height:1;letter-spacing:-.01em;
  background:linear-gradient(155deg,var(--firstlight) 0%,var(--gold) 35%,var(--fire) 85%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 10px rgba(255,120,20,.3));
}
.nav-sub{font-family:var(--sans);font-weight:200;font-size:.65rem;letter-spacing:.42em;color:rgba(255,180,80,.45);text-transform:uppercase;}

/* FIX-15: aria-label on nav element; FIX-19: remove !important from nav-cta */
nav{display:flex;align-items:center;gap:.5rem;}
nav a{
  font-family:var(--sans);font-weight:300;font-size:1.3rem;
  letter-spacing:.12em;color:var(--muted);text-transform:uppercase;
  padding:.6rem 1rem;transition:.3s;
}
nav a:hover{color:var(--ignition);}
/* FIX-19: active should NOT apply to nav-cta button */
nav a.active:not(.nav-cta){color:var(--ignition);}
.nav-cta{
  margin-left:1.5rem;padding:.85rem 2rem;
  border:1px solid rgba(255,160,40,.3);border-radius:3rem;
  color:var(--ignition);font-weight:500;white-space:nowrap;
}
.nav-cta:hover{background:rgba(255,160,40,.08);border-color:var(--ignition);}

/* FIX-8: menu icon z-index above nav overlay */
#menu-icon{font-size:3rem;color:var(--white);display:none;cursor:pointer;z-index:400;position:relative;}

/* ═══════════════════════════════════════
   SECTIONS — FIX-2: remove CSS display:block on .home
   All show/hide handled purely by JS
═══════════════════════════════════════ */
section{
  position:relative;width:100%;
  padding:11rem 8% 6rem;background:var(--bg);
  display:none;opacity:0;transform:translateY(14px);
  transition:opacity .55s ease,transform .55s ease;
}
section.active{display:block;}
section.visible{opacity:1;transform:translateY(0);}
/* First load — no transition flash */
section.no-transition{transition:none;}

/* ── TYPOGRAPHY ── */
.s-label{
  font-family:var(--sans);font-weight:200;font-size:1.05rem;letter-spacing:.5em;
  color:rgba(255,160,40,.4);text-transform:uppercase;margin-bottom:1rem;
  display:flex;align-items:center;gap:1.2rem;
}
.s-label::before{content:"";width:3rem;height:1px;background:linear-gradient(90deg,transparent,rgba(255,160,40,.4));}
.s-heading{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:clamp(3.8rem,5.5vw,5.5rem);line-height:1.08;letter-spacing:-.02em;
  background:linear-gradient(150deg,var(--firstlight) 0%,var(--gold) 40%,var(--fire) 85%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(255,120,20,.25));margin-bottom:1.5rem;
}
.s-sub{font-size:1.6rem;color:var(--muted);line-height:1.85;letter-spacing:.02em;max-width:62rem;margin-bottom:4.5rem;}

/* ═══════════════════════════════════════
   HOME
═══════════════════════════════════════ */
/* FIX-4: proper padding so content clears header */
#s0{min-height:100vh;padding-top:10rem;}
.home{display:flex;align-items:center;gap:6rem;padding-bottom:5rem;min-height:calc(100vh - 10rem);}
.home-content{flex:1;}
.hero-eyebrow{
  font-family:var(--sans);font-weight:200;font-size:1.05rem;letter-spacing:.55em;
  color:rgba(255,160,40,.5);text-transform:uppercase;margin-bottom:2rem;
  display:flex;align-items:center;gap:1.4rem;
}
.hero-eyebrow::before{content:"";width:4rem;height:1px;background:linear-gradient(90deg,transparent,rgba(255,160,40,.5));}
.hero-name{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:clamp(4.2rem,8vw,7rem);line-height:1.02;letter-spacing:-.01em;
  background:linear-gradient(155deg,var(--firstlight) 0%,var(--gold) 30%,var(--ignition) 55%,var(--fire) 85%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:nameGlow 5s ease-in-out infinite;
}
@keyframes nameGlow{
  0%,100%{filter:drop-shadow(0 0 18px rgba(255,120,20,.28));}
  50%{filter:drop-shadow(0 0 34px rgba(255,160,40,.55));}
}

/* FIX-10: role animation using opacity+absolute, not display:none */
.hero-roles-wrap{
  position:relative;height:3.2rem;overflow:hidden;
  margin-top:.5rem;margin-bottom:1.5rem;
}
.hero-role{
  position:absolute;top:0;left:0;
  font-family:var(--serif);font-style:italic;font-size:2.2rem;
  color:var(--ignition);font-weight:300;
  opacity:0;white-space:nowrap;
  animation:roleIn 16s linear infinite;
  animation-delay:calc(4s * var(--i));
}
@keyframes roleIn{
  0%{opacity:0;}
  2%{opacity:1;}
  23%{opacity:1;}
  25%{opacity:0;}
  100%{opacity:0;}
}

.hero-bio{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:2rem;line-height:1.7;color:rgba(255,220,140,.7);
  padding-left:2rem;margin:2rem 0 1.5rem;max-width:54rem;letter-spacing:.01em;
  /* FIX-22: border only on non-mobile — handled in responsive */
  border-left:2px solid rgba(255,160,40,.25);
}
.hero-p{font-size:1.6rem;line-height:1.9;letter-spacing:.02em;color:var(--muted);max-width:50rem;margin-bottom:3.5rem;}

.hero-actions{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
.btn-fire{
  display:inline-flex;align-items:center;gap:.9rem;padding:1.35rem 3rem;
  background:linear-gradient(135deg,var(--fire),var(--ignition));border-radius:4rem;
  font-family:var(--sans);font-weight:600;font-size:1.4rem;letter-spacing:.1em;
  color:var(--bg);text-transform:uppercase;box-shadow:0 0 2rem rgba(255,96,16,.25);transition:.4s;
}
.btn-fire:hover{box-shadow:0 0 3rem rgba(255,130,30,.45);transform:translateY(-2px);}
.btn-ghost{
  display:inline-flex;align-items:center;gap:.9rem;padding:1.35rem 3rem;
  border:1px solid rgba(255,160,40,.22);border-radius:4rem;
  font-family:var(--sans);font-weight:300;font-size:1.4rem;letter-spacing:.1em;
  color:rgba(255,180,80,.65);text-transform:uppercase;transition:.4s;
}
.btn-ghost:hover{border-color:var(--ignition);color:var(--ignition);}
.hero-socials{display:flex;gap:1rem;margin-top:1.5rem;}
.hero-socials a{
  display:inline-flex;padding:1rem;border:1px solid rgba(255,160,40,.18);
  border-radius:50%;font-size:1.8rem;color:rgba(255,180,80,.45);transition:.4s;
}
.hero-socials a:hover{border-color:var(--ignition);color:var(--ignition);box-shadow:0 0 1rem rgba(255,160,40,.2);}

/* Photo */
.home-photo{flex-shrink:0;}
.photo-frame{position:relative;width:clamp(26rem,28vw,36rem);height:clamp(26rem,28vw,36rem);}
.photo-ring-outer{
  position:absolute;inset:0;border-radius:50%;border:1px solid transparent;
  background:linear-gradient(var(--bg),var(--bg)) padding-box,
    conic-gradient(from 0deg,rgba(255,140,30,0) 0%,rgba(255,180,60,.65) 25%,rgba(255,240,160,.9) 40%,rgba(255,180,60,.65) 55%,rgba(255,140,30,0) 70%) border-box;
  animation:spinRing 20s linear infinite;
}
.photo-ring-mid{
  position:absolute;inset:12px;border-radius:50%;border:1px solid transparent;
  background:linear-gradient(var(--bg),var(--bg)) padding-box,
    conic-gradient(from 200deg,rgba(255,200,80,0) 0%,rgba(255,200,80,.3) 40%,rgba(255,240,160,.55) 55%,rgba(255,200,80,.3) 70%,rgba(255,200,80,0) 100%) border-box;
  animation:spinRing 13s linear infinite reverse;
}
@keyframes spinRing{to{transform:rotate(360deg);}}
.photo-inner{position:absolute;inset:22px;border-radius:50%;overflow:hidden;background:var(--bg);}
/* FIX-16: loading lazy */
.photo-inner img{width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:50%;loading:lazy;}
.photo-glow{position:absolute;bottom:-1rem;left:50%;transform:translateX(-50%);width:70%;height:2.5rem;background:radial-gradient(ellipse,rgba(255,120,20,.28) 0%,transparent 70%);filter:blur(8px);animation:horizPulse 4s ease-in-out infinite;}
@keyframes horizPulse{0%,100%{opacity:.4;width:55%;}50%{opacity:.8;width:75%;}}
.photo-horizon{position:absolute;bottom:18px;left:8%;width:84%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,200,80,.5),rgba(255,240,160,.8),rgba(255,200,80,.5),transparent);}

/* ═══════════════════════════════════════
   TRUST BAND — FIX-1,21: managed by JS, no min-width overflow
═══════════════════════════════════════ */
.trust-band{
  background:var(--bg2);border-top:1px solid rgba(255,160,40,.06);border-bottom:1px solid rgba(255,160,40,.06);
  padding:3.5rem 8%;display:none;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:3rem;
}
.trust-band.active{display:flex;}
.trust-stat{text-align:center;}
.trust-stat .num{
  font-family:var(--serif);font-style:italic;font-weight:300;font-size:4rem;line-height:1;
  background:linear-gradient(135deg,var(--gold),var(--ignition));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.trust-stat .label{font-size:1.3rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-weight:300;margin-top:.4rem;}
.trust-divider{width:1px;height:4rem;background:rgba(255,160,40,.1);}
/* FIX-21: removed min-width that caused overflow */
.trust-quote{
  flex:1;
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:1.8rem;line-height:1.65;color:rgba(255,220,140,.55);
  text-align:center;
  border-left:2px solid rgba(255,160,40,.15);border-right:2px solid rgba(255,160,40,.15);
  padding:0 3rem;
}

/* ═══════════════════════════════════════
   SERVICES
═══════════════════════════════════════ */
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(30rem,1fr));gap:2rem;}
.svc-card{
  background:var(--card);border:1px solid rgba(255,160,40,.06);
  border-radius:2rem;padding:3rem 2.8rem;position:relative;overflow:hidden;transition:.4s;
}
.svc-card::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--fire),var(--ignition),transparent);opacity:0;transition:.4s;}
.svc-card:hover{border-color:rgba(255,160,40,.2);transform:translateY(-5px);}
.svc-card:hover::after{opacity:1;}
.svc-icon{width:5.5rem;height:5.5rem;background:linear-gradient(135deg,rgba(255,96,16,.1),rgba(255,160,40,.05));border:1px solid rgba(255,140,30,.1);border-radius:1.4rem;display:flex;align-items:center;justify-content:center;margin-bottom:2rem;font-size:2.5rem;color:var(--ignition);transition:.4s;}
.svc-card:hover .svc-icon{color:var(--gold);}
.svc-outcome{font-family:var(--sans);font-weight:500;font-size:1.1rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,160,40,.5);margin-bottom:.6rem;}
.svc-card h3{font-family:var(--serif);font-style:italic;font-weight:400;font-size:2.2rem;color:var(--firstlight);margin-bottom:1rem;}
.svc-card p{font-size:1.5rem;color:var(--muted);line-height:1.8;letter-spacing:.01em;}
/* FIX-9: arrow base rotation fixed */
.svc-arrow{display:inline-flex;align-items:center;gap:.7rem;margin-top:1.8rem;font-size:1.25rem;letter-spacing:.15em;color:rgba(255,160,40,.3);text-transform:uppercase;font-weight:300;transition:.4s;}
.svc-arrow i{font-size:1.5rem;transform:rotate(225deg);transition:.35s;}
.svc-card:hover .svc-arrow{color:var(--ignition);}
.svc-card:hover .svc-arrow i{transform:rotate(180deg);}

/* ═══════════════════════════════════════
   CREDENTIALS
═══════════════════════════════════════ */
.cred-container{display:grid;grid-template-columns:1fr 2fr;gap:5rem;align-items:start;}
.cred-nav{display:flex;flex-direction:column;gap:1.2rem;}
.cred-btn{width:100%;padding:1.6rem 2rem;background:var(--card);border:1px solid rgba(255,160,40,.06);border-radius:1.2rem;font-family:var(--sans);font-weight:300;font-size:1.4rem;letter-spacing:.1em;color:var(--muted);text-align:left;cursor:pointer;transition:.3s;text-transform:uppercase;display:flex;align-items:center;gap:1.2rem;}
.cred-btn i{font-size:1.8rem;color:rgba(255,160,40,.3);transition:.3s;}
.cred-btn:hover{border-color:rgba(255,160,40,.18);color:var(--white);}
.cred-btn.active{border-color:rgba(255,140,30,.38);color:var(--ignition);background:linear-gradient(135deg,rgba(255,100,16,.05),var(--card));}
.cred-btn.active i{color:var(--ignition);}
.cred-panel{display:none;}
.cred-panel.active{display:block;}
.cred-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(27rem,1fr));gap:1.8rem;max-height:50rem;overflow-y:auto;margin-top:2rem;}
.cred-list::-webkit-scrollbar{width:.5rem;}
.cred-list:hover::-webkit-scrollbar-thumb{background:rgba(255,140,30,.25);border-radius:1rem;}
.cred-item{background:var(--card);border:1px solid rgba(255,160,40,.06);border-radius:1.4rem;padding:2.5rem;transition:.3s;}
.cred-item:hover{border-color:rgba(255,160,40,.18);}
.cred-year{font-family:var(--sans);font-weight:200;font-size:1.15rem;letter-spacing:.2em;color:var(--ignition);margin-bottom:.6rem;text-transform:uppercase;}
.cred-item h3{font-family:var(--serif);font-style:italic;font-weight:400;font-size:1.9rem;color:var(--firstlight);margin-bottom:.5rem;}
.cred-org{position:relative;margin-left:1.8rem;margin-bottom:1rem;font-size:1.3rem;color:rgba(255,180,80,.45);}
.cred-org::before{content:"";position:absolute;top:50%;transform:translateY(-50%);left:-1.8rem;padding:.35rem;background:var(--fire);border-radius:50%;}
.cred-item p{font-size:1.4rem;color:var(--muted);line-height:1.7;}

/* FIX-11: skills panel — constrain height consistently */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(12rem,1fr));gap:1.5rem;margin-top:2rem;max-height:50rem;overflow-y:auto;}
.skill-item{background:var(--card);border:1px solid rgba(255,160,40,.06);border-radius:1.4rem;padding:2.5rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1rem;transition:.4s;}
.skill-item:hover{border-color:rgba(255,160,40,.22);transform:translateY(-3px);}
.skill-item i{font-size:4.5rem;color:var(--muted);transition:.4s;}
.skill-item:hover i{color:var(--ignition);}
.skill-item span{font-size:1.25rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-weight:300;}
.about-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(22rem,1fr));gap:0;margin-top:2rem;}
.about-row{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 0;border-bottom:1px solid rgba(255,160,40,.05);}
.about-row .lbl{font-size:1.35rem;color:rgba(255,180,80,.38);font-weight:300;letter-spacing:.1em;}
.about-row .val{font-size:1.5rem;color:var(--white);font-weight:400;}

/* ═══════════════════════════════════════
   PORTFOLIO
═══════════════════════════════════════ */
.port-container{display:grid;grid-template-columns:1fr 1.2fr;gap:4rem;align-items:start;}
.port-nav{display:flex;flex-direction:column;gap:1rem;}
.port-item{padding:1.8rem 2.2rem;background:var(--card);border:1px solid rgba(255,160,40,.06);border-radius:1.2rem;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:1.4rem;}
.port-item:hover{border-color:rgba(255,160,40,.18);}
.port-item.active{border-color:rgba(255,140,30,.32);background:linear-gradient(135deg,rgba(255,100,16,.05),var(--card));}
.port-num{font-family:var(--serif);font-style:italic;font-size:2.6rem;color:rgba(255,160,40,.18);font-weight:300;line-height:1;flex-shrink:0;transition:.3s;}
.port-item.active .port-num,.port-item:hover .port-num{color:rgba(255,160,40,.45);}
.port-item-title{font-family:var(--sans);font-weight:300;font-size:1.35rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.port-item.active .port-item-title{color:var(--ignition);}
.port-detail{display:none;}
.port-detail.active{display:block;}
.port-numb{font-family:var(--serif);font-style:italic;font-size:8.5rem;color:transparent;-webkit-text-stroke:.07rem rgba(255,160,40,.1);line-height:1;margin-bottom:1rem;}
.port-detail h3{font-family:var(--serif);font-style:italic;font-weight:400;font-size:3rem;color:var(--firstlight);margin-bottom:1.5rem;}
.port-detail p{font-size:1.55rem;color:var(--muted);line-height:1.82;letter-spacing:.015em;margin-bottom:2rem;}
.port-tag{display:inline-flex;align-items:center;padding:.55rem 1.5rem;background:rgba(255,100,16,.07);border:1px solid rgba(255,140,30,.14);border-radius:2rem;font-size:1.25rem;color:var
